name: Pubblica ONOFF VISIONS su Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Pubblica il sito
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Scarica i file del repository
        uses: actions/checkout@v6

      - name: Pubblica su Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=onoffvisions --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
